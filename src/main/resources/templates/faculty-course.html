<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Course Roster')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5">
    <div class="panel-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <p class="eyebrow mb-2">Roster and Assessment</p>
                <h1 class="h2 mb-0">Student grade entry</h1>
            </div>
            <a class="btn btn-outline-dark" th:href="@{/faculty/dashboard}">Back</a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th>Student</th>
                <th>Registration</th>
                <th>Status</th>
                <th>Current Grade</th>
                <th>Submit Grade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${enrollments}">
                <td th:text="${enrollment.student.fullName}"></td>
                <td th:text="${enrollment.student.registrationNumber}"></td>
                <td th:text="${enrollment.status}"></td>
                <td th:text="${enrollment.grade ?: '-'}"></td>
                <td>
                    <form class="d-flex gap-2" method="post" th:action="@{|/faculty/enrollments/${enrollment.id}/grade|}">
                        <input class="form-control" name="grade" placeholder="A / B+ / C">
                        <button class="btn btn-dark" type="submit">Save</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
