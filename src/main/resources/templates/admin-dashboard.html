<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="eyebrow mb-2">Administrator Console</p>
            <h1 class="h2 mb-0">Academic records overview</h1>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3" th:each="metric : ${metrics}">
            <div class="stat-tile h-100">
                <div class="small text-secondary" th:text="${metric.key}">Metric</div>
                <div class="display-6 fw-semibold" th:text="${metric.value}">0</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="panel-card p-4 table-panel">
                <h2 class="h4">Students</h2>
                <table class="table">
                    <thead><tr><th>Reg No.</th><th>Name</th><th>Department</th><th>Semester</th></tr></thead>
                    <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.registrationNumber}"></td>
                        <td th:text="${student.fullName}"></td>
                        <td th:text="${student.department.code}"></td>
                        <td th:text="${student.currentSemester}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel-card p-4 table-panel">
                <h2 class="h4">Faculty</h2>
                <table class="table">
                    <thead><tr><th>Faculty No.</th><th>Name</th><th>Department</th></tr></thead>
                    <tbody>
                    <tr th:each="faculty : ${facultyMembers}">
                        <td th:text="${faculty.facultyNumber}"></td>
                        <td th:text="${faculty.fullName}"></td>
                        <td th:text="${faculty.department.code}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel-card p-4 table-panel">
                <h2 class="h4">Course Offerings</h2>
                <table class="table">
                    <thead><tr><th>Code</th><th>Title</th><th>Credits</th><th>Instructor</th></tr></thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.courseCode}"></td>
                        <td th:text="${course.title}"></td>
                        <td th:text="${course.creditHours}"></td>
                        <td th:text="${course.instructor.fullName}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel-card p-4 table-panel">
                <h2 class="h4">Enrollments and Grades</h2>
                <table class="table">
                    <thead><tr><th>Student</th><th>Course</th><th>Status</th><th>Grade</th></tr></thead>
                    <tbody>
                    <tr th:each="enrollment : ${enrollments}">
                        <td th:text="${enrollment.student.fullName}"></td>
                        <td th:text="${enrollment.course.courseCode}"></td>
                        <td th:text="${enrollment.status}"></td>
                        <td th:text="${enrollment.grade ?: '-'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
