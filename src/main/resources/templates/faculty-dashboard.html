<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Faculty Dashboard')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="panel-card p-4">
        <p class="eyebrow mb-2">Faculty Portal</p>
        <h1 class="h2 mb-4">Assigned course sections</h1>
        <div class="row g-4">
            <div class="col-md-6" th:each="course : ${courses}">
                <div class="portal-link">
                    <div class="d-flex justify-content-between">
                        <div>
                            <div class="small text-secondary" th:text="${course.courseCode}">CSE201</div>
                            <h2 class="h4 mb-1" th:text="${course.title}">Database Systems</h2>
                            <p class="mb-3">Semester <span th:text="${course.semesterOffered}"></span> • <span th:text="${course.creditHours}"></span> credits</p>
                        </div>
                    </div>
                    <a class="btn btn-outline-dark" th:href="@{|/faculty/courses/${course.id}|}">Open roster</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
