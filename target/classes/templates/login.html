<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="panel-card p-5">
                <p class="eyebrow mb-3">Protected Access</p>
                <h1 class="h2 mb-4">Sign in to the academic records system</h1>
                <div class="alert alert-danger" th:if="${param.error}">Invalid username or password.</div>
                <div class="alert alert-success" th:if="${param.logout}">You have been signed out.</div>
                <form method="post" th:action="@{/login}">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-control form-control-lg" id="username" name="username" type="text">
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control form-control-lg" id="password" name="password" type="password">
                    </div>
                    <button class="btn btn-dark btn-lg w-100" type="submit">Sign in</button>
                </form>
                <hr class="my-4">
                <p class="mb-2"><strong>Demo accounts</strong></p>
                <p class="mb-1">Admin: <code>admin / admin123</code></p>
                <p class="mb-1">Faculty: <code>faculty1 / faculty123</code></p>
                <p class="mb-0">Student: <code>student1 / student123</code></p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
