<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Student Dashboard')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-5">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="panel-card p-4 h-100">
                <p class="eyebrow mb-2">Student Profile</p>
                <h1 class="h3" th:text="${student.fullName}">Student Name</h1>
                <p class="mb-1"><strong>Registration:</strong> <span th:text="${student.registrationNumber}"></span></p>
                <p class="mb-1"><strong>Department:</strong> <span th:text="${student.department.name}"></span></p>
                <p class="mb-1"><strong>Semester:</strong> <span th:text="${student.currentSemester}"></span></p>
                <p class="mb-0"><strong>GPA:</strong> <span th:text="${#numbers.formatDecimal(gpa, 1, 2)}"></span></p>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="panel-card p-4 h-100">
                <p class="eyebrow mb-2">Course Registration</p>
                <h2 class="h3 mb-3">Register for semester courses</h2>
                <form class="row g-3 align-items-end" method="post" th:action="@{/student/register}" th:object="${registrationForm}">
                    <div class="col-md-8">
                        <label class="form-label" for="courseId">Available Course</label>
                        <select class="form-select form-select-lg" id="courseId" th:field="*{courseId}">
                            <option value="">Select a course</option>
                            <option th:each="course : ${availableCourses}" th:value="${course.id}"
                                    th:text="${course.courseCode + ' - ' + course.title + ' (' + course.creditHours + ' credits)'}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-dark btn-lg w-100" type="submit">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="panel-card p-4 mt-4 table-panel">
        <p class="eyebrow mb-2">Academic Results</p>
        <h2 class="h3 mb-3">Enrollment and grade report</h2>
        <table class="table">
            <thead>
            <tr>
                <th>Course</th>
                <th>Title</th>
                <th>Credits</th>
                <th>Status</th>
                <th>Term</th>
                <th>Grade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${enrollments}">
                <td th:text="${enrollment.course.courseCode}"></td>
                <td th:text="${enrollment.course.title}"></td>
                <td th:text="${enrollment.course.creditHours}"></td>
                <td th:text="${enrollment.status}"></td>
                <td th:text="${enrollment.termLabel}"></td>
                <td th:text="${enrollment.grade ?: '-'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
